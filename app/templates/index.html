<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>说明书保管箱</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div id="drop-overlay">松开鼠标即可上传到这里</div>

<header class="topbar">
  <div class="brand">说明书保管箱</div>
  <input id="search-input" type="search" placeholder="搜索：标题 / 厂商 / 型号 / 内容 / 标签 ..." autocomplete="off">
  <div class="topbar-right">
    <button id="btn-sync" class="chip-btn" title="同步非隐藏文件到腾讯云 COS 供访客浏览">☁ 同步分享</button>
    <button id="btn-undo-reorg" class="chip-btn" hidden title="回退上次重整">↶ 回退重整</button>
    <button id="btn-reorganize" class="chip-btn" title="让 AI 重新整理所有分类">✨ 一键重整</button>
    <button id="btn-review" class="chip-btn">待确认 <span id="review-count" class="badge">0</span></button>
    <button id="btn-upload" class="primary-btn">+ 上传文件</button>
    <input id="file-input" type="file" multiple hidden>
  </div>
</header>

<main>
  <aside id="sidebar">
    <div class="sidebar-header">
      <span>分类</span>
      <button id="btn-refresh" title="刷新">⟳</button>
    </div>
    <div id="tree"></div>
  </aside>

  <section id="list">
    <div id="list-toolbar">
      <span id="list-title">全部文档</span>
      <span id="list-count"></span>
    </div>
    <div id="cards"></div>
  </section>

  <section id="detail">
    <div id="detail-empty" class="empty">在左侧选择一份资料以查看详情</div>
    <div id="detail-content" hidden>
      <div class="detail-header">
        <h2 id="d-title">—</h2>
        <div class="detail-actions">
          <button id="d-hide" title="隐藏后不会同步到分享平台">隐藏</button>
          <button id="d-new-tab" title="在浏览器新标签页中打开（用浏览器全屏看）">新窗口</button>
          <button id="d-open-local" title="用系统默认程序打开（如 Adobe / Foxit）">本地打开</button>
          <button id="d-download">下载</button>
          <button id="d-edit">编辑</button>
          <button id="d-delete" class="danger">删除</button>
        </div>
      </div>
      <div class="meta-row">
        <span class="hidden-flag" id="d-hidden-flag" hidden>🚫 已隐藏（不会同步到分享平台）</span>
        <span class="badge gray" id="d-doc-type"></span>
        <span class="meta-item" id="d-cat"></span>
        <span class="meta-item" id="d-vendor"></span>
        <span class="meta-item" id="d-model"></span>
        <span class="meta-item" id="d-conf"></span>
      </div>
      <p id="d-summary" class="summary"></p>
      <div id="d-tags" class="tags"></div>
      <div id="d-preview" class="preview"></div>
    </div>
  </section>
</main>

<div id="upload-toast" class="toast" hidden></div>
<div id="upload-progress" class="progress-stack"></div>

<!-- 编辑对话框 -->
<div id="modal-mask" hidden>
  <div id="modal-edit">
    <h3>编辑分类与标签</h3>
    <div class="form-grid">
      <label>大类
        <select id="e-category">
          <!-- 选项由 app.js 注入 -->
        </select>
      </label>
      <label>细类（可选下拉或自由输入）
        <input id="e-subcategory" list="subcategory-options" autocomplete="off">
        <datalist id="subcategory-options"></datalist>
      </label>
      <label>厂商 / 发布方<input id="e-vendor" placeholder="如有可填"></label>
      <label>型号 / 版本<input id="e-model" placeholder="如有可填"></label>
      <label class="span-2">文档类型<input id="e-doc_type" placeholder="如『用户手册』『行业标准』『小说』"></label>
      <label class="span-2">标题<input id="e-title"></label>
      <label class="span-2">摘要<textarea id="e-summary" rows="3"></textarea></label>
      <label class="span-2">标签（逗号或空格分隔）<input id="e-tags"></label>
    </div>
    <div class="modal-actions">
      <button id="e-cancel">取消</button>
      <button id="e-save" class="primary-btn">保存</button>
    </div>
  </div>
</div>

<!-- 一键重整预览对话框 -->
<div id="reorg-mask" hidden>
  <div id="reorg-dialog">
    <div class="reorg-header">
      <h3>✨ 一键重整 — AI 整理方案</h3>
      <button id="reorg-close-x" class="reorg-x">×</button>
    </div>
    <div id="reorg-body">
      <div id="reorg-loading" class="reorg-state">
        <div class="spinner"></div>
        <p>AI 正在分析你的所有文档摘要，生成新的分类方案...</p>
        <p class="reorg-sub">这一步只读取每份文档的极简摘要（不读原文），通常 10-30 秒</p>
      </div>

      <div id="reorg-error" class="reorg-state" hidden>
        <p class="reorg-err">⚠ <span id="reorg-error-msg"></span></p>
      </div>

      <div id="reorg-result" hidden>
        <div class="reorg-rationale">
          <strong>AI 的整理思路：</strong><span id="reorg-rationale-text"></span>
        </div>

        <div class="reorg-cols">
          <div class="reorg-col">
            <div class="reorg-col-title">当前大类</div>
            <ul id="reorg-cur-cats"></ul>
          </div>
          <div class="reorg-arrow">→</div>
          <div class="reorg-col">
            <div class="reorg-col-title">新大类</div>
            <ul id="reorg-new-cats"></ul>
          </div>
        </div>

        <div class="reorg-changes">
          <div class="reorg-changes-title">
            将要迁移的文档（<span id="reorg-moved-count">0</span> / <span id="reorg-total-count">0</span> 份）
          </div>
          <div id="reorg-moves" class="reorg-moves"></div>
        </div>
      </div>
    </div>

    <div id="reorg-actions" class="reorg-footer" hidden>
      <button id="reorg-cancel">取消</button>
      <button id="reorg-apply" class="primary-btn">应用</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
